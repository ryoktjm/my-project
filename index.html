<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>3D モデルビューアー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Dark theme (default) ───────────────────────────────── */
    :root {
      --bg-body:            #1a1a2e;
      --bg-toolbar:         #16213e;
      --bg-dialog:          #16213e;
      --border-color:       #0f3460;
      --btn-bg:             #0f3460;
      --btn-hover:          #1a4f8a;
      --btn-active:         #0a2a50;
      --btn-cancel-bg:      #333;
      --btn-cancel-hover:   #444;
      --text-primary:       #e0e0e0;
      --text-dim:           #aaa;
      --text-selection:     #7ab3e0;
      --input-bg:           #0f3460;
      --input-border:       #1a4f8a;
      --drop-overlay-bg:    rgba(15, 52, 96, 0.85);
      --drop-overlay-border:#1a4f8a;
      --loading-overlay-bg: rgba(26, 26, 46, 0.85);
    }

    /* ── Light theme ────────────────────────────────────────── */
    [data-theme="light"] {
      --bg-body:            #f0f2f8;
      --bg-toolbar:         #ffffff;
      --bg-dialog:          #ffffff;
      --border-color:       #c0cce0;
      --btn-bg:             #4a7ab5;
      --btn-hover:          #3a6aa0;
      --btn-active:         #2a5a8a;
      --btn-cancel-bg:      #d0d8e8;
      --btn-cancel-hover:   #b8c4d8;
      --text-primary:       #1a1a2e;
      --text-dim:           #555;
      --text-selection:     #1a4f8a;
      --input-bg:           #eef2f8;
      --input-border:       #90aac8;
      --drop-overlay-bg:    rgba(74, 122, 181, 0.75);
      --drop-overlay-border:#4a7ab5;
      --loading-overlay-bg: rgba(240, 242, 248, 0.85);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    #toolbar button {
      padding: 6px 14px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--btn-bg);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }

    #toolbar button:hover  { background: var(--btn-hover); }
    #toolbar button:active { background: var(--btn-active); }
    #toolbar button:disabled { opacity: 0.35; cursor: default; }
    #toolbar button:disabled:hover { background: var(--btn-bg); }

    #theme-select {
      padding: 5px 8px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--btn-bg);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    #theme-select:hover { background: var(--btn-hover); }

    #selection-label {
      font-size: 12px;
      color: var(--text-selection);
      margin-left: 4px;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #toolbar .separator {
      width: 1px;
      height: 24px;
      background: var(--border-color);
      margin: 0 4px;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #drop-overlay {
      position: absolute;
      inset: 0;
      background: var(--drop-overlay-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--text-primary);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      border: 3px dashed var(--drop-overlay-border);
    }

    #drop-overlay.visible { opacity: 1; }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--loading-overlay-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--text-primary);
      display: none;
    }

    #loading-overlay.visible { display: flex; }

    /* Move dialog */
    #move-dialog {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #move-dialog.visible { display: flex; }

    #move-dialog .dialog-box {
      background: var(--bg-dialog);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 24px;
      width: 300px;
    }

    #move-dialog h3 {
      margin-bottom: 16px;
      font-size: 16px;
      color: var(--text-primary);
    }

    #move-dialog .field {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 8px;
    }

    #move-dialog label {
      width: 24px;
      font-weight: bold;
      color: var(--text-primary);
    }

    #move-dialog input {
      flex: 1;
      padding: 6px 8px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 13px;
    }

    #move-dialog .unit { font-size: 12px; color: var(--text-dim); }

    #move-dialog .buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    #move-dialog .buttons button {
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      border: none;
    }

    #move-dialog .buttons .ok {
      background: var(--btn-bg);
      color: var(--text-primary);
    }
    #move-dialog .buttons .ok:hover { background: var(--btn-hover); }

    #move-dialog .buttons .cancel {
      background: var(--btn-cancel-bg);
      color: var(--text-primary);
    }
    #move-dialog .buttons .cancel:hover { background: var(--btn-cancel-hover); }
  </style>
</head>
<body>

  <div id="toolbar">
    <button id="btn-open">ファイルを開く</button>
    <div class="separator"></div>
    <button id="btn-move" disabled>移動</button>
    <button id="btn-export">エクスポート</button>
    <button id="btn-delete" disabled>削除</button>
    <div class="separator"></div>
    <button id="btn-reset">リセット</button>
    <div class="separator"></div>
    <select id="theme-select" title="テーマ">
      <option value="dark">ダーク</option>
      <option value="light">ライト</option>
      <option value="system">システム</option>
    </select>
    <span id="selection-label"></span>
  </div>

  <div id="canvas-container">
    <div id="drop-overlay">ここにファイルをドロップ</div>
    <div id="loading-overlay">読み込み中...</div>
  </div>

  <!-- Move dialog -->
  <div id="move-dialog">
    <div class="dialog-box">
      <h3>平行移動（相対値）</h3>
      <div class="field">
        <label>X</label>
        <input type="number" id="move-x" value="0" step="0.0001" />
        <span class="unit">mm</span>
      </div>
      <div class="field">
        <label>Y</label>
        <input type="number" id="move-y" value="0" step="0.0001" />
        <span class="unit">mm</span>
      </div>
      <div class="field">
        <label>Z</label>
        <input type="number" id="move-z" value="0" step="0.0001" />
        <span class="unit">mm</span>
      </div>
      <div class="buttons">
        <button class="cancel" id="move-cancel">キャンセル</button>
        <button class="ok" id="move-ok">適用</button>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "./node_modules/three/build/three.module.js",
      "three/addons/": "./node_modules/three/examples/jsm/"
    }
  }
  </script>
  <script src="./node_modules/occt-import-js/dist/occt-import-js.js"></script>
  <script type="module" src="renderer.js"></script>
</body>
</html>
