<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:;" />
  <title>3D モデルビューアー</title>
</head>
<body>

  <div id="toolbar">
    <button id="btn-open">ファイルを開く</button>
    <div class="separator"></div>
    <button id="btn-move"   disabled>移動</button>
    <button id="btn-export">STL 書き出し</button>
    <button id="btn-export-glb">GLB 書き出し</button>
    <button id="btn-delete" disabled>削除</button>
    <div class="separator"></div>
    <button id="btn-reset">リセット</button>
    <div class="separator"></div>
    <select id="theme-select" title="テーマ">
      <option value="dark">ダーク</option>
      <option value="light">ライト</option>
      <option value="system">システム</option>
    </select>
    <span id="selection-label"></span>
  </div>

  <div id="main-content">

    <div id="canvas-container">
      <div id="drop-overlay">ここにファイルをドロップ</div>
      <div id="loading-overlay">読み込み中...</div>
    </div>

    <div id="sidebar">
      <div class="sidebar-title">モデル一覧</div>
      <ul id="outliner-list"></ul>
    </div>

  </div>

  <!-- Move dialog -->
  <div id="move-dialog">
    <div class="dialog-box">
      <h3>平行移動（相対値）</h3>
      <div class="field">
        <label>X</label>
        <input type="number" id="move-x" value="0" step="0.0001" />
        <span class="unit">mm</span>
      </div>
      <div class="field">
        <label>Y</label>
        <input type="number" id="move-y" value="0" step="0.0001" />
        <span class="unit">mm</span>
      </div>
      <div class="field">
        <label>Z</label>
        <input type="number" id="move-z" value="0" step="0.0001" />
        <span class="unit">mm</span>
      </div>
      <div class="buttons">
        <button class="cancel" id="move-cancel">キャンセル</button>
        <button class="ok"     id="move-ok">適用</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
